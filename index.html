<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feelings and a Dream</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #000;
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 300;
      line-height: 1.7;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }

    .site-name {
      font-size: 1rem;
      letter-spacing: 0.04em;
      margin-bottom: 3rem;
    }

    .post-list { list-style: none; }

    .post-item {
      padding: 1.8rem 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .post-item:first-child { border-top: 1px solid #e0e0e0; }
    .post-item:hover .post-title { opacity: 0.45; }

    .post-item a {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .post-date {
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 0.4rem;
    }

    .post-title {
      font-size: 1.2rem;
      font-weight: 400;
      margin-bottom: 0.4rem;
      transition: opacity 0.15s;
    }

    .post-excerpt {
      font-size: 0.9rem;
      color: #666;
      line-height: 1.7;
    }

    .empty-state {
      font-size: 0.95rem;
      color: #999;
      padding: 2rem 0;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="site-name">Feelings and a Dream</div>

  <ul class="post-list">

    <!-- Add a new entry here each time you publish a post. Example:

    <li class="post-item">
      <a href="posts/it-begins.html">
        <div class="post-date">March 2026</div>
        <div class="post-title">It begins.</div>
        <div class="post-excerpt">The first real day of work on Purpose.</div>
      </a>
    </li>

    -->

  </ul>

  <p class="empty-state">Nothing here yet.</p>

</div>
</body>
</html>
