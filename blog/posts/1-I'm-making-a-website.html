<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Title — Feelings and a Dream</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #000;
      font-family: 'Source Serif 4', Georgia, serif;
      font-weight: 300;
      line-height: 1.7;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 4rem 2rem 6rem;
    }

    .site-name {
      font-size: 1rem;
      letter-spacing: 0.04em;
      margin-bottom: 3rem;
      text-decoration: none;
      color: #000;
      display: block;
    }

    .site-name:hover { opacity: 0.5; }

    .post-back {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #999;
      text-decoration: none;
      margin-bottom: 2.5rem;
    }

    .post-back::before { content: '← '; }
    .post-back:hover { color: #000; }

    .post-date {
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 0.6rem;
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 400;
      line-height: 1.25;
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid #e0e0e0;
    }

    .body {
      font-size: 1rem;
      line-height: 1.9;
      color: #111;
    }

    .body p + p { margin-top: 1.1em; }

    .body img {
      width: 100%;
      display: block;
      margin: 2em 0;
    }
  </style>
</head>
<body>
<div class="container">

  <a class="site-name" href="../../index.html">Feelings and a Dream</a>
  <a class="post-back" href="../../index.html">All posts</a>

  <div class="post-date">Month Year</div>
  <h1>Post Title</h1>

  <div class="body">
    <p>Your post content goes here.</p>
  </div>

</div>
</body>
</html>
